name: Rebuild Latest Image

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for the rebuild'
        required: true
        default: 'Hotfix for current version'

permissions:
  packages: write
  contents: read
  attestations: write
  id-token: write

jobs:
  build-and-publish:
    name: Rebuild & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Read version from config
        id: get_version
        run: |
          VERSION=$(jq -r .version config/hawki_version.json)

          if [ -z "$VERSION" ] || [ "$VERSION" == "null" ]; then
            echo "Error: Could not read version from config/hawki_version.json"
            exit 1
          fi

          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          target: app_prod
          platforms: linux/amd64,linux/arm64
          tags: |
            digitalenvironments/hawki:latest
            digitalenvironments/hawki:${{ steps.get_version.outputs.version }}
          cache-from: type=gha,scope=${{ steps.get_version.outputs.version }}
          cache-to: type=gha,mode=max,scope=${{ steps.get_version.outputs.version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: index.docker.io/digitalenvironments/hawki
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - uses: hawk-digital-environments/hawk-pipeline-actions/send-discord-notification@v1
        with:
          webhook-url: ${{ secrets.DISCORD_UPDATE_WEBHOOK_URL }}
          release-name: "Hotfix Rebuild: ${{ steps.get_version.outputs.version }}"
          release-body: "Manual rebuild triggering by workflow dispatch. Reason: ${{ inputs.reason }}"
          release-url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          content: "||@everyone|| ⚠️ **HAWKI ${{ steps.get_version.outputs.version }}** has been rebuilt and republished (Hotfix)."

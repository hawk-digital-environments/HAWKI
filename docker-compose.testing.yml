services:
    test:
        container_name: ${PROJECT_NAME:-hawki}-test
        build:
            context: .
            target: app_test
        environment:
            - APP_ENV=testing
            - DB_CONNECTION=sqlite
            - "DB_DATABASE=:memory:"
            - CACHE_STORE=array
            - SESSION_DRIVER=array
            - QUEUE_CONNECTION=sync
            - MAIL_MAILER=array
            - PHPUNIT_ARGS=
        volumes:
            - ./:/var/www/html
        entrypoint: ["sh", "-c", "APP_ENV=testing php vendor/bin/phpunit $PHPUNIT_ARGS"]
